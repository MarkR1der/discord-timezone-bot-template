services:
  - type: web
    name: discord-timezone-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: TIMEZONE_WEB_ENABLED
        value: "true"
      - key: PUBLIC_BASE_URL
        sync: false
