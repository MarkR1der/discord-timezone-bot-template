services:
  - type: web
    name: discord-timezone-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://discord-timezone-bot-template.onrender.com
